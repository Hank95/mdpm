<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>MDPM Board</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root {
    --bg: #0d1117;
    --bg-elev: #161b22;
    --bg-elev-2: #1f252e;
    --border: #30363d;
    --text: #c9d1d9;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --danger: #f85149;
    --warn: #d29922;
    --ok: #3fb950;
    --hi: #f85149;
    --med: #d29922;
    --lo: #8b949e;
    --shadow: 0 1px 0 rgba(255,255,255,0.03), 0 4px 12px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, "JetBrains Mono", monospace;
    font-size: 13px;
    line-height: 1.45;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-elev);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header h1 {
    font-size: 14px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin: 0;
    color: var(--text);
  }
  header .meta { color: var(--text-dim); font-size: 12px; }
  header .meta strong { color: var(--text); }
  header .controls { display: flex; align-items: center; gap: 12px; }
  header button {
    background: var(--bg-elev-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    border-radius: 4px;
  }
  header button:hover { border-color: var(--accent); color: var(--accent); }
  header input[type="text"],
  header select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    font-family: inherit;
    font-size: 12px;
    border-radius: 4px;
  }
  header input[type="text"] { min-width: 200px; }
  header input[type="text"]:focus,
  header select:focus { outline: none; border-color: var(--accent); }

  main {
    display: grid;
    grid-template-columns: repeat(4, minmax(260px, 1fr));
    gap: 12px;
    padding: 16px;
    align-items: start;
  }
  .column {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 6px;
    display: flex;
    flex-direction: column;
    min-height: 200px;
  }
  .col-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .col-head .count {
    background: var(--bg-elev-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1px 8px;
    font-size: 11px;
    color: var(--text);
  }
  .col-body { padding: 10px; display: flex; flex-direction: column; gap: 10px; }

  .card {
    background: var(--bg-elev-2);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 10px 12px;
    cursor: pointer;
    transition: border-color 0.1s ease;
    box-shadow: var(--shadow);
  }
  .card:hover { border-color: var(--accent); }
  .card .title-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 6px;
  }
  .card .id {
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .card .title {
    font-weight: 600;
    color: var(--text);
    margin: 0;
    font-size: 13px;
  }
  .card .meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 6px;
    font-size: 11px;
  }
  .badge {
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 6px;
    background: var(--bg);
    color: var(--text-dim);
  }
  .badge.pri-high { color: var(--hi); border-color: var(--hi); }
  .badge.pri-medium { color: var(--med); border-color: var(--med); }
  .badge.pri-low { color: var(--lo); }
  .badge.due { color: var(--text-dim); }
  .badge.due.overdue { color: var(--danger); border-color: var(--danger); }
  .badge.tag { color: var(--accent); }
  .badge.ext { color: var(--text-dim); }

  .progress {
    margin-top: 8px;
    height: 4px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
    position: relative;
  }
  .progress > span {
    display: block;
    height: 100%;
    background: var(--ok);
  }
  .progress-label {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 3px;
  }

  .empty {
    color: var(--text-dim);
    font-style: italic;
    padding: 20px 12px;
    text-align: center;
    font-size: 12px;
  }

  /* Modal */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 6px;
    max-width: 700px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    padding: 20px 24px;
    box-shadow: var(--shadow);
  }
  .modal h2 { margin-top: 0; color: var(--text); }
  .modal .section { margin-top: 16px; }
  .modal .section h3 {
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin: 0 0 6px 0;
  }
  .modal pre {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px;
    white-space: pre-wrap;
    word-break: break-word;
    font-size: 12px;
    color: var(--text);
  }
  .modal .close {
    position: absolute;
    top: 14px;
    right: 18px;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 18px;
    cursor: pointer;
  }
  .modal-wrap { position: relative; }
  .modal ul { margin: 0; padding-left: 18px; }
  .modal li { margin: 2px 0; }

  .footer {
    padding: 12px 20px;
    color: var(--text-dim);
    font-size: 11px;
    text-align: right;
    border-top: 1px solid var(--border);
  }

  @media (max-width: 1100px) {
    main { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 640px) {
    main { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>MDPM Board</h1>
    <div class="meta" id="meta">loading…</div>
  </div>
  <div class="controls">
    <input type="text" id="search" placeholder="filter: title, tag, id…" />
    <select id="priority-filter" title="priority">
      <option value="">all priorities</option>
      <option value="high">high</option>
      <option value="medium">medium</option>
      <option value="low">low</option>
    </select>
    <select id="assignee-filter" title="assignee">
      <option value="">all assignees</option>
    </select>
    <button id="refresh">refresh</button>
  </div>
</header>

<main>
  <section class="column" data-col="inbox">
    <div class="col-head"><span>Inbox</span><span class="count" id="count-inbox">0</span></div>
    <div class="col-body" id="col-inbox"></div>
  </section>
  <section class="column" data-col="backlog">
    <div class="col-head"><span>Backlog</span><span class="count" id="count-backlog">0</span></div>
    <div class="col-body" id="col-backlog"></div>
  </section>
  <section class="column" data-col="active">
    <div class="col-head"><span>Active</span><span class="count" id="count-active">0</span></div>
    <div class="col-body" id="col-active"></div>
  </section>
  <section class="column" data-col="done">
    <div class="col-head"><span>Done</span><span class="count" id="count-done">0</span></div>
    <div class="col-body" id="col-done"></div>
  </section>
</main>

<div class="footer">read-only view — edit the .md files in <code>tasks/</code> to change state</div>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-wrap">
    <button class="close" onclick="closeModal()" aria-label="close">&times;</button>
    <div class="modal" id="modal"></div>
  </div>
</div>

<script>
const PRIORITY_ORDER = { high: 0, medium: 1, low: 2 };
let ALL_TASKS = [];
let FILTER = "";
let PRIORITY_FILTER = "";
let ASSIGNEE_FILTER = "";

async function fetchTasks() {
  const res = await fetch("/api/tasks", { cache: "no-store" });
  if (!res.ok) throw new Error("failed to fetch tasks");
  return res.json();
}

function escapeHtml(s) {
  if (s == null) return "";
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function render() {
  const cols = { inbox: [], backlog: [], active: [], done: [] };
  for (const t of ALL_TASKS) {
    if (!cols[t.status_dir]) continue;
    if (PRIORITY_FILTER && t.priority !== PRIORITY_FILTER) continue;
    if (ASSIGNEE_FILTER && (t.assigned_to || "") !== ASSIGNEE_FILTER) continue;
    if (FILTER) {
      const hay = (
        (t.title || "") + " " +
        (t.id || "") + " " +
        (t.tags || []).join(" ") + " " +
        (t.assigned_to || "")
      ).toLowerCase();
      if (!hay.includes(FILTER)) continue;
    }
    cols[t.status_dir].push(t);
  }
  // Sort: inbox/backlog by priority then due; active by updated; done by updated desc
  cols.inbox.sort(sortPriorityDue);
  cols.backlog.sort(sortPriorityDue);
  cols.active.sort(sortPriorityDue);
  cols.done.sort((a, b) => (b.updated || "").localeCompare(a.updated || ""));

  for (const key of Object.keys(cols)) {
    document.getElementById("count-" + key).textContent = cols[key].length;
    const body = document.getElementById("col-" + key);
    body.innerHTML = "";
    if (cols[key].length === 0) {
      const e = document.createElement("div");
      e.className = "empty";
      e.textContent = emptyMessage(key);
      body.appendChild(e);
      continue;
    }
    for (const t of cols[key]) {
      body.appendChild(renderCard(t));
    }
  }
}

function sortPriorityDue(a, b) {
  const pa = PRIORITY_ORDER[a.priority] ?? 9;
  const pb = PRIORITY_ORDER[b.priority] ?? 9;
  if (pa !== pb) return pa - pb;
  const da = a.due || "9999-99-99";
  const db = b.due || "9999-99-99";
  if (da !== db) return da.localeCompare(db);
  return (a.created || "").localeCompare(b.created || "");
}

function emptyMessage(col) {
  switch (col) {
    case "inbox": return "no untriaged requests";
    case "backlog": return "backlog is clear";
    case "active": return "nothing in flight";
    case "done": return "nothing shipped yet";
    default: return "empty";
  }
}

function renderCard(t) {
  const card = document.createElement("div");
  card.className = "card";
  card.onclick = () => openModal(t);

  const acceptance = t.acceptance && t.acceptance.total
    ? `<div class="progress"><span style="width:${Math.round((t.acceptance.done / t.acceptance.total) * 100)}%"></span></div>
       <div class="progress-label">acceptance: ${t.acceptance.done}/${t.acceptance.total}</div>`
    : "";

  const badges = [];
  if (t.priority) {
    badges.push(`<span class="badge pri-${escapeHtml(t.priority)}">${escapeHtml(t.priority)}</span>`);
  }
  if (t.due) {
    const cls = t.overdue ? "badge due overdue" : "badge due";
    const prefix = t.overdue ? "overdue " : "due ";
    badges.push(`<span class="${cls}">${prefix}${escapeHtml(t.due)}</span>`);
  }
  for (const tag of (t.tags || []).slice(0, 5)) {
    badges.push(`<span class="badge tag">#${escapeHtml(tag)}</span>`);
  }
  if (t.jira_id) badges.push(`<span class="badge ext">${escapeHtml(t.jira_id)}</span>`);
  if (t.wrike_id) badges.push(`<span class="badge ext">wrike:${escapeHtml(t.wrike_id)}</span>`);
  if (t.assigned_to) badges.push(`<span class="badge">@${escapeHtml(t.assigned_to)}</span>`);

  card.innerHTML = `
    <div class="title-row">
      <span class="title">${escapeHtml(t.title)}</span>
      <span class="id">${escapeHtml(t.id || "")}</span>
    </div>
    <div class="meta-row">${badges.join("")}</div>
    ${acceptance}
  `;
  return card;
}

function openModal(t) {
  const overlay = document.getElementById("overlay");
  const modal = document.getElementById("modal");
  const deps = (t.depends_on || []).length
    ? `<div class="section"><h3>Depends on</h3><ul>${t.depends_on.map(d => `<li>${escapeHtml(d)}</li>`).join("")}</ul></div>`
    : "";
  const notes = t.notes ? `<div class="section"><h3>Notes</h3><pre>${escapeHtml(t.notes)}</pre></div>` : "";
  const log = t.latest_log ? `<div class="section"><h3>Latest work log</h3><pre>${escapeHtml(t.latest_log)}</pre></div>` : "";
  const obj = t.objective ? `<div class="section"><h3>Objective</h3><pre>${escapeHtml(t.objective)}</pre></div>` : "";

  modal.innerHTML = `
    <div class="meta" style="color: var(--text-dim); font-size: 11px;">${escapeHtml(t.id || "")} · ${escapeHtml(t.status_dir)}</div>
    <h2>${escapeHtml(t.title)}</h2>
    <div class="meta-row">
      <span class="badge pri-${escapeHtml(t.priority || "medium")}">${escapeHtml(t.priority || "medium")}</span>
      ${t.due ? `<span class="badge due ${t.overdue ? "overdue" : ""}">${t.overdue ? "overdue " : "due "}${escapeHtml(t.due)}</span>` : ""}
      ${(t.tags || []).map(x => `<span class="badge tag">#${escapeHtml(x)}</span>`).join("")}
      ${t.assigned_to ? `<span class="badge">@${escapeHtml(t.assigned_to)}</span>` : ""}
      ${t.jira_id ? `<span class="badge ext">${escapeHtml(t.jira_id)}</span>` : ""}
      ${t.wrike_id ? `<span class="badge ext">wrike:${escapeHtml(t.wrike_id)}</span>` : ""}
    </div>
    ${obj}
    ${deps}
    ${notes}
    ${log}
    <div class="section"><h3>File</h3><pre>${escapeHtml(t.path)}</pre></div>
  `;
  overlay.classList.add("open");
}

function closeModal() {
  document.getElementById("overlay").classList.remove("open");
}

document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeModal();
});

document.getElementById("refresh").addEventListener("click", load);
document.getElementById("search").addEventListener("input", (e) => {
  FILTER = e.target.value.trim().toLowerCase();
  render();
});
document.getElementById("priority-filter").addEventListener("change", (e) => {
  PRIORITY_FILTER = e.target.value;
  render();
});
document.getElementById("assignee-filter").addEventListener("change", (e) => {
  ASSIGNEE_FILTER = e.target.value;
  render();
});

function rebuildAssigneeOptions() {
  const select = document.getElementById("assignee-filter");
  const current = select.value;
  const names = new Set();
  for (const t of ALL_TASKS) {
    if (t.assigned_to) names.add(t.assigned_to);
  }
  const sorted = Array.from(names).sort();
  select.innerHTML = '<option value="">all assignees</option>';
  for (const n of sorted) {
    const opt = document.createElement("option");
    opt.value = n;
    opt.textContent = "@" + n;
    if (n === current) opt.selected = true;
    select.appendChild(opt);
  }
}

async function load() {
  try {
    const data = await fetchTasks();
    ALL_TASKS = data.tasks || [];
    document.getElementById("meta").innerHTML =
      `<strong>${ALL_TASKS.length}</strong> tasks · updated ${new Date().toLocaleTimeString()}`;
    rebuildAssigneeOptions();
    render();
  } catch (err) {
    document.getElementById("meta").textContent = "error: " + err.message;
  }
}

load();
// Auto-refresh every 10s
setInterval(load, 10000);
</script>

</body>
</html>
